name: Sync Volume Breakout Storage

on:
  workflow_dispatch:
  schedule:
    # IST 09:53-15:23, every 30 minutes, offset from crowded GitHub cron minutes.
    - cron: "23,53 4-9 * * 1-5"
    # IST 15:48 final post-close storage pass.
    - cron: "18 10 * * 1-5"

permissions:
  contents: read

concurrency:
  group: sync-volume-breakout-storage
  cancel-in-progress: false

jobs:
  sync-volume-breakout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Volume Breakout storage for NubraOSS
        env:
          PHONE_NO: ${{ secrets.PHONE_NO }}
          MPIN: ${{ secrets.MPIN }}
          NUBRA_TOTP_SECRET: ${{ secrets.NUBRA_TOTP_SECRET }}
          NUBRA_OI_WALLS_ENV: PROD
          NUBRA_APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SCAN_SYMBOLS_CSV: data/universes/nifty300_symbols.csv
          NUBRA_DEVICE_ID: Nubra-OSS-${{ secrets.PHONE_NO }}
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          python scripts/sync_volume_breakout_store.py --environment PROD --lookback-days 3 --batch-size 5
