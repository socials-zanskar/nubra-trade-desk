name: Sync Supabase Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Nubra snapshots to Supabase
        env:
          PHONE_NO: ${{ secrets.PHONE_NO }}
          MPIN: ${{ secrets.MPIN }}
          NUBRA_OI_WALLS_ENV: PROD
          NUBRA_APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCAN_SYMBOL_SOURCE: ${{ secrets.SCAN_SYMBOL_SOURCE }}
          SCAN_SYMBOLS_CSV: ${{ secrets.SCAN_SYMBOLS_CSV }}
        run: python scripts/sync_supabase_snapshots.py
