name: Sync Supabase Snapshots

on:
  workflow_dispatch:
  schedule:
    # GitHub can delay/drop very frequent schedule events. Trigger every
    # 30 minutes, then run three 10-minute passes inside the same job.
    # UTC 03:47 = IST 09:17.
    - cron: "47 3 * * 1-5"
    # UTC 04:17-09:47 = IST 09:47-15:17.
    - cron: "17,47 4-9 * * 1-5"

permissions:
  contents: read

concurrency:
  group: sync-supabase-snapshots
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Nubra snapshots to Supabase
        env:
          PHONE_NO: ${{ secrets.PHONE_NO }}
          MPIN: ${{ secrets.MPIN }}
          NUBRA_TOTP_SECRET: ${{ secrets.NUBRA_TOTP_SECRET }}
          NUBRA_OI_WALLS_ENV: PROD
          NUBRA_APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SCAN_BATCH_SIZE: ${{ secrets.SCAN_BATCH_SIZE }}
          SCAN_REFRESH_MINUTES: ${{ secrets.SCAN_REFRESH_MINUTES }}
          SCAN_SYMBOL_SOURCE: csv
          SCAN_SYMBOLS_CSV: data/universes/nifty300_symbols.csv
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/sync_supabase_snapshots.py
          else
            for attempt in 1 2 3; do
              echo "Snapshot pass ${attempt}/3"
              python scripts/sync_supabase_snapshots.py
              if [ "$attempt" != "3" ]; then
                echo "Sleeping 10 minutes before next snapshot pass..."
                sleep 600
              fi
            done
          fi
