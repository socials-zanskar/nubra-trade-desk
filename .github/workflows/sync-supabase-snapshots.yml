name: Sync Supabase Snapshots

on:
  workflow_dispatch:
  schedule:
    # Market-hours sync in IST, offset from crowded GitHub cron minutes.
    # UTC 03:47/03:57 = IST 09:17/09:27 pre-open checks.
    - cron: "47,57 3 * * 1-5"
    # UTC 04:07-09:57 = IST 09:37-15:27, every 10 minutes.
    - cron: "7,17,27,37,47,57 4-9 * * 1-5"
    # UTC 10:07 = IST 15:37 final post-close snapshot.
    - cron: "7 10 * * 1-5"

permissions:
  contents: read

concurrency:
  group: sync-supabase-snapshots
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Nubra snapshots to Supabase
        env:
          PHONE_NO: ${{ secrets.PHONE_NO }}
          MPIN: ${{ secrets.MPIN }}
          NUBRA_TOTP_SECRET: ${{ secrets.NUBRA_TOTP_SECRET }}
          NUBRA_OI_WALLS_ENV: PROD
          NUBRA_APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SCAN_BATCH_SIZE: ${{ secrets.SCAN_BATCH_SIZE }}
          SCAN_REFRESH_MINUTES: ${{ secrets.SCAN_REFRESH_MINUTES }}
          SCAN_SYMBOL_SOURCE: csv
          SCAN_SYMBOLS_CSV: data/universes/nifty300_symbols.csv
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          python scripts/sync_supabase_snapshots.py
